<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contáctanos</title>
    <style>
        /* Estilos generales (manteniendo la misma línea visual) */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 0;
        }

        .contacto-container {
            max-width: 600px;
            margin: 50px auto;
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border-top: 5px solid #2e7d32;
        }

        h1 {
            color: #2e7d32;
            font-size: 2.2rem;
            margin-bottom: 10px;
            text-align: center;
        }

        .descripcion {
            font-size: 1rem;
            color: #666;
            text-align: center;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Estilos del Formulario */
        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: bold;
            color: #444;
            font-size: 0.95rem;
        }

        /* Inputs y Textarea */
        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        /* Efecto cuando el usuario da clic para escribir */
        input:focus,
        textarea:focus {
            outline: none;
            border-color: #2e7d32;
        }

        textarea {
            resize: vertical; /* Permite estirar hacia abajo pero no hacia los lados */
            min-height: 120px;
        }

        /* Botón de enviar formulario */
        button[type="submit"] {
            background-color: #2e7d32;
            color: white;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button[type="submit"]:hover {
            background-color: #1b5e20;
        }

        /* Botón de regresar al inicio */
        .btn-regresar-box {
            text-align: center;
            margin-top: 30px;
        }

        .btn-regresar {
            display: inline-block;
            padding: 10px 20px;
            background-color: #757575;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        .btn-regresar:hover {
            background-color: #424242;
        }
    </style>
</head>
<body>

    <div class="contacto-container">
        <h1>Contáctanos</h1>
        <p class="descripcion">
            ¿Tienes alguna sugerencia para mejorar el sitio o quieres reportar un problema de contaminación en tu comunidad? Déjanos un mensaje.
        </p>

        <!-- Formulario de contacto -->
        <form action="#" method="POST">
            <div class="form-group">
                <label for="nombre">Nombre Completo:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ej. Juan Pérez" required>
            </div>

            <div class="form-group">
                <label for="correo">Correo Electrónico:</label>
                <input type="email" id="correo" name="correo" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="form-group">
                <label for="mensaje">Tu Mensaje:</label>
                <textarea id="mensaje" name="mensaje" placeholder="Escribe aquí tus comentarios o dudas..." required></textarea>
            </div>

            <button type="submit">Enviar Mensaje</button>
        </form>

        <!-- Botón para regresar -->
        <div class="btn-regresar-box">
            <a href="index.html" class="btn-regresar">← Volver al Inicio</a>
        </div>
    </div>

</body>
</html>
